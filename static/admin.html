<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>竹林 AI | 管理员控制台</title>
    <script src="/static/js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link rel="stylesheet" href="/static/css/bamboo.css" />
  </head>
  <body data-page="admin" data-protected="true">
    <template id="page-template">
      <section class="grid gap-6 xl:grid-cols-[minmax(0,1.7fr)_360px]">
        <div class="space-y-6">
          <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-4" id="admin-stats"></div>
          <div class="bamboo-panel p-6">
            <div class="bamboo-mini-label">Account Matrix</div>
            <h2 class="bamboo-display mt-2 text-3xl font-semibold text-bamboo-deep">账号与权限</h2>
            <div class="mt-6 overflow-x-auto" id="admin-users"></div>
          </div>
          <div class="bamboo-panel p-6">
            <div class="bamboo-mini-label">Book Ownership</div>
            <h2 class="bamboo-display mt-2 text-3xl font-semibold text-bamboo-deep">书籍归属分配</h2>
            <div class="mt-6 overflow-x-auto" id="admin-books"></div>
          </div>
          <div class="bamboo-panel p-6">
            <div class="bamboo-mini-label">Book Memory</div>
            <h2 class="bamboo-display mt-2 text-3xl font-semibold text-bamboo-deep">书籍记忆</h2>
            <div class="mt-5 space-y-4">
              <select class="bamboo-field" id="admin-memory-book-select">
                <option value="">请选择书籍</option>
              </select>
              <div class="rounded-[1.2rem] bg-white/70 p-4 text-sm text-slate-500" id="admin-memory-summary">请选择一本书查看记忆。</div>
              <div class="flex flex-wrap gap-3" id="admin-memory-tabs">
                <button class="bamboo-btn-primary" data-memory-tab="style" type="button">自动总结文风</button>
                <button class="bamboo-btn-secondary" data-memory-tab="episodic" type="button">章节情景记忆</button>
                <button class="bamboo-btn-secondary" data-memory-tab="semantic" type="button">语义记忆</button>
              </div>
              <div class="rounded-[1.5rem] bg-white/76 p-4 shadow-cloud" data-memory-panel="style">
                <div class="bamboo-mini-label">自动总结文风</div>
                <div class="mt-3 text-sm leading-7 text-slate-600 whitespace-pre-wrap" id="admin-memory-style-anchor">暂无内容。</div>
              </div>
              <div class="rounded-[1.5rem] bg-white/76 p-4 shadow-cloud hidden" data-memory-panel="episodic">
                <div class="bamboo-mini-label">章节情景记忆</div>
                <div class="mt-3 space-y-3" id="admin-memory-episodic-list"></div>
              </div>
              <div class="rounded-[1.5rem] bg-white/76 p-4 shadow-cloud hidden" data-memory-panel="semantic">
                <div class="bamboo-mini-label">语义记忆</div>
                <div class="mt-3 space-y-3" id="admin-memory-semantic-list"></div>
              </div>
            </div>
          </div>
        </div>
        <aside class="space-y-6">
          <div class="bamboo-panel p-6">
            <div class="bamboo-mini-label">新建账号</div>
            <form class="mt-5 space-y-4" id="admin-create-user-form">
              <input class="bamboo-field" id="admin-new-username" placeholder="用户名" required />
              <input class="bamboo-field" id="admin-new-password" placeholder="初始密码" required />
              <input class="bamboo-field" id="admin-new-display-name" placeholder="显示名" />
              <input class="bamboo-field" id="admin-new-email" placeholder="Email" />
              <select class="bamboo-field" id="admin-new-role">
                <option value="author">author</option>
                <option value="admin">admin</option>
                <option value="super_admin">super_admin</option>
              </select>
              <button class="bamboo-btn-primary w-full" type="submit">创建账号</button>
            </form>
          </div>
          <div class="bamboo-panel p-6">
            <div class="bamboo-mini-label">重置密码</div>
            <form class="mt-5 space-y-4" id="admin-reset-password-form">
              <input class="bamboo-field" id="admin-reset-user-id" placeholder="用户 ID" type="number" required />
              <input class="bamboo-field" id="admin-reset-password" placeholder="新密码" required />
              <button class="bamboo-btn-secondary w-full" type="submit">重置密码</button>
            </form>
          </div>
          <div class="bamboo-panel p-6">
            <div class="bamboo-mini-label">数据库备份</div>
            <form class="mt-5 space-y-4" id="admin-backup-form">
              <label class="flex items-center gap-3 text-sm text-slate-600">
                <input id="admin-backup-enabled" type="checkbox" />
                <span>启用自动数据库备份</span>
              </label>
              <label class="block">
                <span class="text-sm text-slate-500">每隔几小时备份一次</span>
                <input class="bamboo-field mt-2" id="admin-backup-interval-hours" max="720" min="1" type="number" />
              </label>
              <label class="block">
                <span class="text-sm text-slate-500">备份保留天数</span>
                <input class="bamboo-field mt-2" id="admin-backup-retention-days" max="365" min="1" type="number" />
              </label>
              <div class="rounded-[1rem] bg-white/70 p-4 text-sm text-slate-500" id="admin-backup-summary">正在加载备份状态…</div>
              <div class="flex gap-3">
                <button class="bamboo-btn-primary flex-1" type="submit">保存备份策略</button>
                <button class="bamboo-btn-secondary" id="admin-backup-run-now" type="button">立即备份</button>
              </div>
            </form>
            <div class="mt-4 space-y-3" id="admin-backup-recent"></div>
          </div>
          <div class="bamboo-panel p-6">
            <div class="bamboo-mini-label">近期写作记录</div>
            <ul class="mt-4 space-y-3" id="admin-audit"></ul>
          </div>
        </aside>
      </section>
    </template>
    <script type="module" src="/static/js/app.js"></script>
  </body>
</html>

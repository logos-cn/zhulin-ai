<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>竹林 AI | 人物卡工作台</title>
    <script src="/static/js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link rel="stylesheet" href="/static/css/bamboo.css" />
  </head>
  <body data-page="characters" data-protected="true">
    <template id="page-template">
      <section class="space-y-6">
        <div class="bamboo-panel p-6">
          <div class="flex flex-col gap-4 xl:flex-row xl:items-end xl:justify-between">
            <div>
              <div class="bamboo-mini-label">Cast Workspace</div>
              <h2 class="bamboo-display mt-2 text-3xl font-semibold text-bamboo-deep">人物卡工作台</h2>
              <p class="mt-3 max-w-3xl text-sm leading-7 text-slate-500">
                人物卡单独管理。卡面只看重点信息，编辑时再打开详情弹窗，避免世界页和写作页都被人物表单挤占。
              </p>
            </div>
            <div class="grid gap-3 md:grid-cols-[220px_auto_auto]">
              <select class="bamboo-field" id="characters-book-select"></select>
              <button class="bamboo-btn-secondary" id="characters-create" type="button">新增人物</button>
              <button class="bamboo-btn-ghost text-rose-600" id="characters-delete-all" type="button">一键删除所有人物卡</button>
            </div>
          </div>
        </div>

        <div class="grid gap-4 md:grid-cols-4" id="characters-stats"></div>

        <div class="bamboo-panel p-6">
          <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div class="grid gap-3 md:grid-cols-3">
              <label class="block">
                <span class="bamboo-mini-label">搜索人物</span>
                <input class="bamboo-field mt-2" id="characters-search" placeholder="按人物名 / 别名 / 小传搜索" />
              </label>
              <label class="block">
                <span class="bamboo-mini-label">生命状态</span>
                <select class="bamboo-field mt-2" id="characters-status-filter">
                  <option value="">全部状态</option>
                </select>
              </label>
              <label class="block">
                <span class="bamboo-mini-label">排序方式</span>
                <select class="bamboo-field mt-2" id="characters-sort">
                  <option value="name">按姓名</option>
                  <option value="updated_at">按更新时间</option>
                </select>
              </label>
            </div>
            <div class="rounded-[1rem] bg-white/70 px-4 py-3 text-sm text-slate-500" id="characters-summary">
              等待载入人物卡。
            </div>
          </div>

          <div class="mt-6 grid gap-5 sm:grid-cols-2 xl:grid-cols-3" id="characters-grid"></div>
        </div>
      </section>

      <div class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/55 px-4 py-6" id="characters-modal">
        <div class="flex max-h-[92vh] w-full max-w-5xl flex-col overflow-hidden rounded-[2rem] bg-[#f7f3ea] shadow-2xl ring-1 ring-black/5">
          <div class="shrink-0 flex items-center justify-between gap-4 border-b border-slate-200/80 px-6 py-5">
            <div>
              <div class="bamboo-mini-label">人物卡详情</div>
              <div class="mt-2 text-xl font-semibold text-bamboo-deep" id="characters-modal-title">新增人物</div>
            </div>
            <button class="bamboo-btn-secondary" id="characters-close" type="button">关闭</button>
          </div>

          <form class="min-h-0 flex-1 overflow-y-auto px-6 py-5" id="characters-form">
            <div class="grid gap-4 md:grid-cols-2">
              <label class="block">
                <span class="bamboo-mini-label">人物名</span>
                <input class="bamboo-field mt-2" id="characters-name" required />
              </label>
              <label class="block">
                <span class="bamboo-mini-label">年龄</span>
                <input class="bamboo-field mt-2" id="characters-age" placeholder="例如：17 / 二十出头 / 不详" />
              </label>
            </div>

            <label class="mt-4 block">
              <span class="bamboo-mini-label">别名（外号或昵称）</span>
              <input class="bamboo-field mt-2" id="characters-aliases" placeholder="多个别名用 、 / ， / , 分隔" />
            </label>

            <div class="mt-4 grid gap-4 md:grid-cols-2">
              <label class="block">
                <span class="bamboo-mini-label">短期目标</span>
                <textarea class="bamboo-field mt-2 min-h-[7rem] resize-y" id="characters-short-goal"></textarea>
              </label>
              <label class="block">
                <span class="bamboo-mini-label">长期目标</span>
                <textarea class="bamboo-field mt-2 min-h-[7rem] resize-y" id="characters-long-goal"></textarea>
              </label>
            </div>

            <div class="mt-4 grid gap-4 md:grid-cols-2">
              <label class="block">
                <span class="bamboo-mini-label">动机</span>
                <textarea class="bamboo-field mt-2 min-h-[7rem] resize-y" id="characters-motivation"></textarea>
              </label>
              <label class="block">
                <span class="bamboo-mini-label">性格</span>
                <textarea class="bamboo-field mt-2 min-h-[7rem] resize-y" id="characters-personality"></textarea>
              </label>
            </div>

            <div class="mt-4 grid gap-4 md:grid-cols-2">
              <label class="block">
                <span class="bamboo-mini-label">外貌</span>
                <textarea class="bamboo-field mt-2 min-h-[7rem] resize-y" id="characters-appearance"></textarea>
              </label>
              <label class="block">
                <span class="bamboo-mini-label">弱点</span>
                <textarea class="bamboo-field mt-2 min-h-[7rem] resize-y" id="characters-weakness"></textarea>
              </label>
            </div>

            <label class="mt-4 block">
              <span class="bamboo-mini-label">秘密</span>
              <textarea class="bamboo-field mt-2 min-h-[7rem] resize-y" id="characters-secrets"></textarea>
            </label>

            <label class="mt-4 block">
              <span class="bamboo-mini-label">人物小传</span>
              <textarea class="bamboo-field mt-2 min-h-[10rem] resize-y" id="characters-biography"></textarea>
            </label>

            <div class="mt-4 rounded-[1.25rem] bg-white/78 p-4">
              <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                <div>
                  <div class="bamboo-mini-label">生命状态</div>
                  <div class="mt-1 text-xs leading-6 text-slate-500">状态名支持自定义，例如“失忆”“被通缉”“灵魂离体”。</div>
                </div>
                <div class="flex gap-3">
                  <input class="bamboo-field min-w-[14rem]" id="characters-status-input" placeholder="输入状态名后添加" />
                  <button class="bamboo-btn-secondary" id="characters-status-add" type="button">添加状态</button>
                </div>
              </div>
              <div class="mt-4 flex flex-wrap gap-2" id="characters-statuses"></div>
            </div>

            <div class="mt-4 rounded-[1.25rem] bg-white/78 p-4">
              <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                <div>
                  <div class="bamboo-mini-label">章节时间节点</div>
                  <div class="mt-1 text-xs leading-6 text-slate-500">按章节记录人物做了什么、在哪里、处于什么状态。</div>
                </div>
                <button class="bamboo-btn-secondary" id="characters-timeline-add" type="button">新增时间节点</button>
              </div>
              <div class="mt-4 space-y-3" id="characters-timeline-list"></div>
            </div>
          </form>

          <div class="shrink-0 flex flex-wrap items-center justify-between gap-3 border-t border-slate-200/80 px-6 py-5">
            <button class="bamboo-btn-ghost text-rose-600" id="characters-delete" type="button">删除人物</button>
            <div class="flex flex-wrap gap-3">
              <button class="bamboo-btn-secondary" id="characters-cancel" type="button">取消</button>
              <button class="bamboo-btn-primary" form="characters-form" type="submit">保存人物卡</button>
            </div>
          </div>
        </div>
      </div>
    </template>
    <script type="module" src="/static/js/app.js"></script>
  </body>
</html>

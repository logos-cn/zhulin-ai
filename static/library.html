<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>竹林 AI | 我的书库</title>
    <script src="/static/js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link rel="stylesheet" href="/static/css/bamboo.css" />
  </head>
  <body data-page="library" data-protected="true">
    <template id="page-template">
      <section class="grid gap-6 xl:grid-cols-[minmax(0,1.8fr)_360px]">
        <div class="space-y-6">
          <div class="grid gap-4 md:grid-cols-3" id="library-stats"></div>
          <div class="bamboo-panel p-6">
            <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
              <div>
                <div class="bamboo-mini-label">Book Shelf</div>
                <h2 class="bamboo-display mt-2 text-3xl font-semibold text-bamboo-deep">当前项目</h2>
              </div>
              <a class="bamboo-btn-primary" href="/writer">进入写作空间</a>
            </div>
            <div class="mt-6 grid gap-4 md:grid-cols-2 xl:grid-cols-3" id="library-books"></div>
          </div>
        </div>
        <aside class="space-y-6">
          <div class="bamboo-panel p-6">
            <div class="bamboo-mini-label">当前用户</div>
            <div class="mt-3 text-2xl font-semibold text-bamboo-deep" id="library-current-user"></div>
            <p class="mt-3 text-sm leading-7 text-slate-500">从这里创建书籍，并进入真实的写作、配置和版本页面。</p>
          </div>
          <div class="bamboo-panel p-6">
            <div class="bamboo-mini-label">新建书籍</div>
            <form class="mt-5 space-y-4" id="book-create-form">
              <input class="bamboo-field" id="new-book-title" placeholder="书名" required />
              <input class="bamboo-field" id="new-book-genre" placeholder="题材，如仙侠 / 悬疑" />
              <textarea class="bamboo-field min-h-[8rem] resize-y" id="new-book-description" placeholder="一句话简介"></textarea>
              <button class="bamboo-btn-primary w-full" type="submit">创建并进入写作</button>
            </form>
          </div>
          <div class="bamboo-panel p-6">
            <div class="flex items-center justify-between gap-4">
              <div>
                <div class="bamboo-mini-label">最近活动</div>
                <h3 class="mt-2 text-xl font-semibold text-bamboo-deep">快照与变更</h3>
              </div>
              <a class="bamboo-btn-ghost px-0" href="/history">查看全部</a>
            </div>
            <div class="mt-5 space-y-4" id="library-activity"></div>
          </div>
        </aside>
      </section>
    </template>
    <script type="module" src="/static/js/app.js"></script>
  </body>
</html>
